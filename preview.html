<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium residential, Airbnb, and short-term rental cleaning services across Ontario by North Shine Cleaners." />
    <meta name="theme-color" content="#071426" />
    <title>North Shine Cleaners | Premium Cleaning Services in Ontario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { navy: "#071426", ink: "#101827", gold: "#C9A24A", champagne: "#F8F1DE", porcelain: "#F7FAFC" },
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"], display: ["Playfair Display", "Georgia", "serif"] },
            boxShadow: { premium: "0 24px 70px rgba(7,20,38,.16)", glow: "0 18px 50px rgba(201,162,74,.22)" },
          },
        },
      };
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      html { scroll-behavior: smooth; }
      body { margin: 0; font-family: Inter, system-ui, sans-serif; color: #101827; }
      section { scroll-margin-top: 88px; }
      .field { min-height: 3rem; width: 100%; border-radius: .375rem; border: 1px solid #e2e8f0; padding: .8rem 1rem; font-size: .875rem; font-weight: 600; color: #071426; outline: none; }
      .field:focus { border-color: #c9a24a; box-shadow: 0 0 0 4px rgba(201,162,74,.15); }
      .kicker { margin-bottom: 1rem; color: #c9a24a; font-size: .75rem; font-weight: 800; letter-spacing: .24em; text-transform: uppercase; }
      .title { font-family: "Playfair Display", Georgia, serif; color: #071426; font-size: clamp(2.25rem, 5vw, 3rem); line-height: 1.08; font-weight: 700; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const phone = "437-424-8283";
      const email = "info@northshinecleaners.com";
      const services = [
        ["Airbnb Turnover Cleaning", "Hotel-level resets, linens, restocking, guest-ready presentation, and reliable turnover timing."],
        ["Residential Cleaning", "Polished recurring cleans for busy homes, apartments, condos, and family properties."],
        ["Deep Cleaning", "Top-to-bottom service for kitchens, bathrooms, baseboards, appliances, and high-touch areas."],
        ["Move-In / Move-Out Cleaning", "Fresh starts and handoff-ready spaces for owners, tenants, landlords, and property managers."],
        ["Office Cleaning", "Professional workspace cleaning that keeps teams focused and client areas presentation-ready."],
        ["Same-Day Cleaning", "Fast response cleaning support when your schedule changes and the space still needs to shine."],
      ];
      const reviews = [
        ["Maya L.", "Airbnb Host, Toronto", "North Shine made our turnover process feel effortless. The space looked spotless, smelled fresh, and our next guests mentioned how clean everything was.", "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=220&q=80"],
        ["Daniel R.", "Homeowner, Mississauga", "Professional, punctual, and incredibly detail-oriented. They treated our home with care and communicated clearly from quote to finish.", "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=220&q=80"],
        ["Priya S.", "Property Manager, Vaughan", "The consistency is what stands out. Every clean is done to a high standard, which matters for short-term rental expectations.", "https://images.unsplash.com/photo-1531123897727-8f129e1688ce?auto=format&fit=crop&w=220&q=80"],
      ];
      const features = ["Reliable & On-Time", "Professional Team", "Attention to Detail", "Flexible Scheduling", "Affordable Pricing", "Fast Response Time"];
      const gallery = [
        ["Kitchen Reset", "https://images.unsplash.com/photo-1556911220-bff31c812dba?auto=format&fit=crop&w=900&q=80", "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=900&q=80"],
        ["Guest Bath Polish", "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=900&q=80", "https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?auto=format&fit=crop&w=900&q=80"],
        ["Suite Turnover", "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=900&q=80", "https://images.unsplash.com/photo-1616046229478-9901c5536a45?auto=format&fit=crop&w=900&q=80"],
      ];
      const faqs = [
        ["Do you clean Airbnbs and short-term rentals?", "Yes. We support turnovers, presentation details, restocking checks, and schedule-sensitive service."],
        ["Which areas do you serve?", "We provide residential and short-term rental cleaning services across Ontario, based on availability."],
        ["Can I request same-day cleaning?", "Same-day cleaning is available when scheduling permits. Calling is the fastest way to confirm."],
        ["Do you bring cleaning supplies?", "We can bring professional supplies or use client-provided products when preferred."],
      ];

      function Logo({ dark = false }) {
        return <a href="#home" className="flex items-center gap-3"><span className="grid h-11 w-11 place-items-center rounded-full bg-navy text-gold shadow-glow ring-1 ring-gold/30">✦</span><span><span className={`block font-display text-xl font-semibold ${dark ? "text-white" : "text-navy"}`}>North Shine</span><span className="block text-[11px] font-bold uppercase tracking-[.22em] text-gold">Cleaners</span></span></a>;
      }
      function QuoteForm({ compact = false }) {
        return <form className={`grid gap-4 ${compact ? "p-6" : ""}`}><div className="grid gap-4 sm:grid-cols-2"><input className="field" placeholder="Name" /><input className="field" placeholder="Phone Number" /></div><div className="grid gap-4 sm:grid-cols-2"><select className="field"><option>Service Needed</option>{services.map(([s]) => <option key={s}>{s}</option>)}</select><input className="field" placeholder="Property Size" /></div><input className="field" type="date" /><textarea className="field resize-none" rows={compact ? 4 : 5} placeholder="Message"></textarea><button type="button" className="rounded-md bg-navy px-6 py-4 text-sm font-bold text-white transition hover:bg-gold hover:text-navy">Submit Quote Request</button></form>;
      }
      function App() {
        const [modal, setModal] = React.useState(false);
        const [menu, setMenu] = React.useState(false);
        const links = ["About", "Services", "Airbnb Hosts", "Gallery", "FAQ", "Contact"];
        return <div className="bg-white">
          {modal && <div className="fixed inset-0 z-50 grid place-items-center bg-navy/70 p-4 backdrop-blur-sm"><div className="w-full max-w-2xl overflow-hidden rounded-lg bg-white shadow-premium"><div className="flex items-center justify-between border-b px-6 py-5"><div><p className="kicker">Request a Quote</p><h2 className="font-display text-3xl font-semibold text-navy">Tell us about your space</h2></div><button onClick={() => setModal(false)} className="rounded-full p-2 text-slate-500 hover:bg-slate-100">X</button></div><QuoteForm compact /></div></div>}
          <header className="fixed inset-x-0 top-0 z-40 border-b bg-white/90 backdrop-blur-xl"><nav className="mx-auto flex max-w-7xl items-center justify-between px-5 py-4 lg:px-8"><Logo /><div className="hidden items-center gap-7 lg:flex">{links.map(link => <a key={link} href={`#${link.toLowerCase().replaceAll(" ", "-")}`} className="text-sm font-semibold text-slate-700 hover:text-gold">{link}</a>)}</div><div className="hidden items-center gap-3 lg:flex"><a href={`tel:${phone}`} className="rounded-md border px-4 py-3 text-sm font-bold text-navy hover:text-gold">{phone}</a><button onClick={() => setModal(true)} className="rounded-md bg-navy px-5 py-3 text-sm font-bold text-white hover:bg-gold hover:text-navy">Request a Quote</button></div><button onClick={() => setMenu(!menu)} className="lg:hidden">{menu ? "X" : "Menu"}</button></nav>{menu && <div className="grid gap-3 border-t bg-white px-5 py-4 lg:hidden">{links.map(link => <a key={link} onClick={() => setMenu(false)} href={`#${link.toLowerCase().replaceAll(" ", "-")}`} className="font-semibold text-navy">{link}</a>)}</div>}</header>
          <main>
            <section id="home" className="relative isolate flex min-h-[92vh] items-center overflow-hidden pt-28 text-white"><img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=2200&q=85" alt="Professional cleaner preparing a bright modern home" className="absolute inset-0 -z-20 h-full w-full object-cover" /><div className="absolute inset-0 -z-10 bg-gradient-to-r from-navy via-navy/80 to-navy/20"></div><div className="mx-auto grid w-full max-w-7xl gap-10 px-5 py-20 lg:grid-cols-[1.05fr_.95fr] lg:px-8"><div className="max-w-3xl"><p className="mb-5 inline-flex rounded-full border border-white/20 bg-white/10 px-4 py-2 text-xs font-bold uppercase tracking-[.24em] text-champagne">✦ Premium Ontario Cleaning</p><h1 className="font-display text-5xl font-semibold leading-[1.03] sm:text-6xl lg:text-7xl">Professional Cleaning Services You Can Trust</h1><p className="mt-6 max-w-2xl text-lg leading-8 text-white/80">Reliable residential, Airbnb, and short-term rental cleaning services across Ontario.</p><div className="mt-9 flex flex-col gap-3 sm:flex-row"><button onClick={() => setModal(true)} className="min-h-12 rounded-md bg-gold px-5 text-sm font-bold text-navy shadow-glow">Get a Free Quote</button><a href={`tel:${phone}`} className="inline-flex min-h-12 items-center justify-center rounded-md border border-white/30 bg-white/10 px-5 text-sm font-bold text-white hover:bg-white hover:text-navy">Call Now</a></div></div><div className="hidden content-end lg:grid"><div className="ml-auto max-w-md rounded-lg border border-white/20 bg-white/10 p-6 backdrop-blur-xl"><div className="grid grid-cols-3 gap-4 text-center">{["Airbnb Ready", "Insured Care", "Fast Quotes"].map(item => <div key={item} className="rounded-md bg-white/10 px-3 py-4"><p className="text-gold">★★★★★</p><p className="text-sm font-bold">{item}</p></div>)}</div><p className="mt-5 text-sm leading-6 text-white/75">Built for homeowners, Airbnb hosts, and property managers who need consistent presentation without chasing follow-ups.</p></div></div></div></section>
            <section id="about" className="bg-porcelain px-5 py-24 lg:px-8"><div className="mx-auto grid max-w-7xl gap-12 lg:grid-cols-[.9fr_1.1fr] lg:items-center"><img src="https://images.unsplash.com/photo-1527515637462-cff94eecc1ac?auto=format&fit=crop&w=1200&q=82" alt="Clean modern living room" className="h-[520px] w-full rounded-lg object-cover shadow-premium" /><div><p className="kicker">About North Shine Cleaners</p><h2 className="title">Detail-oriented cleaning with a polished, dependable standard.</h2><p className="mt-6 text-lg leading-8 text-slate-600">North Shine Cleaners focuses on reliable, high-quality cleaning services for homes, Airbnb properties, short-term rentals, and workspaces. Every visit is guided by professionalism, consistency, communication, and customer satisfaction.</p><div className="mt-8 grid gap-4 sm:grid-cols-2">{["Clear communication", "Consistent checklists", "Premium presentation", "Flexible appointments"].map(item => <div key={item} className="rounded-md bg-white p-4 font-bold text-navy shadow-sm">✓ {item}</div>)}</div></div></div></section>
            <section id="services" className="px-5 py-24 lg:px-8"><div className="mx-auto max-w-7xl"><p className="kicker">Services</p><h2 className="title max-w-3xl">Complete cleaning services for premium homes and hosted stays.</h2><div className="mt-12 grid gap-5 md:grid-cols-2 lg:grid-cols-3">{services.map(([name, text]) => <article key={name} className="rounded-lg border border-slate-100 bg-white p-7 shadow-sm transition hover:-translate-y-1 hover:border-gold/50 hover:shadow-premium"><div className="mb-6 grid h-12 w-12 place-items-center rounded-md bg-champagne text-gold">✦</div><h3 className="font-display text-2xl font-semibold text-navy">{name}</h3><p className="mt-4 leading-7 text-slate-600">{text}</p></article>)}</div></div></section>
            <section id="why-choose-us" className="bg-navy px-5 py-24 text-white lg:px-8"><div className="mx-auto grid max-w-7xl gap-12 lg:grid-cols-[.85fr_1.15fr] lg:items-center"><div><p className="kicker">Why Choose Us</p><h2 className="font-display text-4xl font-semibold sm:text-5xl">Premium service should feel calm, clear, and dependable.</h2><p className="mt-6 leading-8 text-white/70">We help clients protect their time, their homes, and their guest experience with responsive service and a refined cleaning standard.</p></div><div className="grid gap-4 sm:grid-cols-2">{features.map(item => <div key={item} className="rounded-md border border-white/10 bg-white/10 p-5 font-bold hover:border-gold/50">✓ {item}</div>)}</div></div></section>
            <section id="airbnb-hosts" className="px-5 py-24 lg:px-8"><div className="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[1.05fr_.95fr] lg:items-center"><div><p className="kicker">For Airbnb Hosts</p><h2 className="title">Guest-ready turnovers that protect your ratings.</h2><p className="mt-6 text-lg leading-8 text-slate-600">Short-term rentals need more than a basic clean. We focus on timing, presentation, high-touch surfaces, bathroom polish, kitchen resets, photo-ready styling, and clear communication before the next check-in.</p><div className="mt-8 grid gap-4 sm:grid-cols-3">{["Turnover timing", "Restock checks", "Guest-first details"].map(item => <div key={item} className="rounded-md bg-porcelain p-5 text-center font-bold text-navy">✦<br />{item}</div>)}</div></div><img src="https://images.unsplash.com/photo-1560448075-bb485b067938?auto=format&fit=crop&w=1200&q=82" alt="Bright Airbnb bedroom prepared for guests" className="h-[500px] w-full rounded-lg object-cover shadow-premium" /></div></section>
            <section id="testimonials" className="bg-porcelain px-5 py-24 lg:px-8"><div className="mx-auto max-w-7xl"><p className="kicker">Testimonials</p><h2 className="title max-w-3xl">Trusted by homeowners, hosts, and property teams.</h2><div className="mt-12 grid gap-6 lg:grid-cols-3">{reviews.map(([name, role, text, image]) => <article key={name} className="rounded-lg bg-white p-7 shadow-sm"><div className="mb-5 text-gold">★★★★★</div><p className="leading-7 text-slate-600">"{text}"</p><div className="mt-7 flex items-center gap-4"><img src={image} alt={`${name} profile`} className="h-12 w-12 rounded-full object-cover" /><div><p className="font-bold text-navy">{name}</p><p className="text-sm text-slate-500">{role}</p></div></div></article>)}</div></div></section>
            <section id="gallery" className="px-5 py-24 lg:px-8"><div className="mx-auto max-w-7xl"><p className="kicker">Before & After</p><h2 className="title max-w-3xl">Visible transformations for the spaces that matter.</h2><div className="mt-12 grid gap-6 lg:grid-cols-3">{gallery.map(([label, before, after]) => <article key={label} className="overflow-hidden rounded-lg border bg-white shadow-sm"><div className="grid grid-cols-2"><div className="relative h-64"><img src={before} alt={`${label} before`} className="h-full w-full object-cover" /><span className="absolute left-3 top-3 rounded bg-navy px-3 py-1 text-xs font-bold text-white">Before</span></div><div className="relative h-64"><img src={after} alt={`${label} after`} className="h-full w-full object-cover" /><span className="absolute left-3 top-3 rounded bg-gold px-3 py-1 text-xs font-bold text-navy">After</span></div></div><h3 className="p-5 font-display text-2xl font-semibold text-navy">{label}</h3></article>)}</div></div></section>
            <section id="quote" className="bg-porcelain px-5 py-24 lg:px-8"><div className="mx-auto grid max-w-7xl gap-10 lg:grid-cols-[.8fr_1.2fr]"><div><p className="kicker">Booking</p><h2 className="title">Request a quote for your next clean.</h2><p className="mt-6 leading-8 text-slate-600">Share the service, property size, and preferred date. North Shine Cleaners will respond quickly with next steps.</p></div><div className="rounded-lg bg-white p-6 shadow-premium sm:p-8"><QuoteForm /></div></div></section>
            <section id="faq" className="px-5 py-24 lg:px-8"><div className="mx-auto max-w-4xl"><p className="kicker text-center">FAQ</p><h2 className="title text-center">Common questions before booking.</h2><div className="mt-12 divide-y rounded-lg border bg-white shadow-sm">{faqs.map(([q, a]) => <details key={q} className="p-6"><summary className="cursor-pointer font-display text-xl font-semibold text-navy">{q}</summary><p className="mt-4 leading-7 text-slate-600">{a}</p></details>)}</div></div></section>
            <section id="contact" className="bg-navy px-5 py-20 text-white lg:px-8"><div className="mx-auto grid max-w-7xl gap-8 md:grid-cols-[1fr_auto] md:items-center"><div><p className="kicker">Contact</p><h2 className="font-display text-4xl font-semibold sm:text-5xl">Ready for a brighter, cleaner space?</h2><div className="mt-7 grid gap-3 text-white/80"><a href={`tel:${phone}`} className="hover:text-gold">Phone: {phone}</a><a href={`mailto:${email}`} className="hover:text-gold">Temporary Email: {email}</a><p>Location: Ontario, Canada</p></div></div><button onClick={() => setModal(true)} className="rounded-md bg-gold px-6 py-4 text-sm font-bold text-navy shadow-glow">Get a Free Quote</button></div></section>
          </main>
          <footer className="bg-[#040B14] px-5 py-10 text-white lg:px-8"><div className="mx-auto flex max-w-7xl flex-col gap-8 md:flex-row md:items-center md:justify-between"><Logo dark /><div className="flex flex-wrap gap-5 text-sm text-white/70">{["About", "Services", "Quote", "FAQ", "Contact"].map(link => <a key={link} href={`#${link.toLowerCase()}`} className="hover:text-gold">{link}</a>)}</div><div className="flex gap-3">{["f", "ig", "x"].map(item => <a key={item} href="#" className="grid h-10 w-10 place-items-center rounded-full border border-white/20 text-white/70 hover:border-gold hover:text-gold">{item}</a>)}</div></div><p className="mx-auto mt-8 max-w-7xl border-t border-white/10 pt-6 text-sm text-white/50">Copyright © 2026 North Shine Cleaners. Premium residential and Airbnb cleaning services across Ontario.</p></footer>
          <a href={`tel:${phone}`} className="fixed bottom-5 right-5 z-40 grid h-14 w-14 place-items-center rounded-full bg-gold text-xs font-bold text-navy shadow-glow sm:hidden">Call</a>
        </div>;
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
